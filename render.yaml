services:
  - type: web
    name: vaquejada-app
    runtime: node
    plan: free
    buildCommand: |
      npm config set registry https://registry.npmjs.org/
      npm config set //registry.npmjs.org/:_authToken ""
      npm install && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CLOUDINARY_CLOUD_NAME
        value: cloud_name
      - key: CLOUDINARY_API_KEY
        value: cloud_key
      - key: CLOUDINARY_API_SECRET
        value: cloud_api
      - key: DATABASE_URL
        fromDatabase:
          name: vaquejada
          property: connectionString

databases:
  - name: vaquejada
    plan: free
    databaseName: vaquejada
    user: admin